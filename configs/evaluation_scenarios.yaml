# configs/evaluation_scenarios.yaml
# Fault injection scenario definitions and evaluation runner settings.
# Fault scripts: demo_app/fault_scenarios/  (01_service_crash.sh ... 08_config_error.sh)
# Runner:        scripts/inject_faults.py

# OTel Demo Fault Scenarios
# 7 fault types x 5 repetitions = 35 total test cases.
# cpu_throttling was removed in Session 12 (undetectable on idle demo).
# Run order: easy -> medium -> hard
fault_types:
  - name: "service_crash"
    script: "demo_app/fault_scenarios/01_service_crash.sh"
    target_service: "cartservice"
    ground_truth: "cartservice"
    difficulty: "easy"
    expected_detection_seconds: 30
    cooldown_seconds: 300  # Long cooldown: probe_up=0 residue persists ~5min after restart

  - name: "high_latency"
    script: "demo_app/fault_scenarios/02_high_latency.sh"
    target_service: "frontend"
    ground_truth: "frontend"
    difficulty: "easy"
    expected_detection_seconds: 60
    cooldown_seconds: 120
    injection_params:
      latency_ms: 500

  - name: "memory_pressure"
    script: "demo_app/fault_scenarios/03_memory_pressure.sh"
    target_service: "checkoutservice"
    ground_truth: "checkoutservice"
    difficulty: "medium"
    expected_detection_seconds: 120
    cooldown_seconds: 180
    injection_params:
      memory_limit_mb: 128

  # cpu_throttling removed in Session 12 after diagnosis showed the fault
  # is undetectable on the idle demo: productcatalogservice baseline CPU is
  # 0.09% of a core, so a cap at 10% (or even 1%) never bites. The fault
  # produces no probe_latency or cpu_usage signal. See docs/evaluation_results.md
  # for details. Script retained at demo_app/fault_scenarios/04_cpu_throttling.sh
  # for reference; not part of the active 35-test suite.

  - name: "connection_exhaustion"
    script: "demo_app/fault_scenarios/05_connection_exhaustion.sh"
    target_service: "redis"
    ground_truth: "redis"
    difficulty: "medium"
    expected_detection_seconds: 90
    cooldown_seconds: 150
    injection_params:
      max_connections: 5

  - name: "network_partition"
    script: "demo_app/fault_scenarios/06_network_partition.sh"
    target_service: "paymentservice"
    ground_truth: "paymentservice"
    difficulty: "medium"
    expected_detection_seconds: 45
    cooldown_seconds: 120

  - name: "cascading_failure"
    script: "demo_app/fault_scenarios/07_cascading_failure.sh"
    target_service: "cartservice"
    ground_truth: "cartservice"
    difficulty: "hard"
    expected_detection_seconds: 60
    cooldown_seconds: 300  # Long cooldown: two restarts + 30s propagation = heavy residue

  - name: "config_error"
    script: "demo_app/fault_scenarios/08_config_error.sh"
    target_service: "productcatalogservice"
    ground_truth: "productcatalogservice"
    difficulty: "hard"
    expected_detection_seconds: 30
    cooldown_seconds: 180  # Longer than default: replacement container needs cleanup
    injection_params:
      env_var: "PRODUCT_CATALOG_SERVICE_PORT"
      invalid_value: "999999"
    # Note: retargeted from currencyservice in Session 12 because v1.10.0
    # currencyservice SIGSEGVs in baseline, making the fault indistinguishable.
    # (cpu_throttling was removed, so productcatalogservice is now targeted
    # by config_error alone — no duplicate-target ambiguity.)

# Evaluation Runner Settings
evaluation:
  repetitions_per_fault: 5
  baseline_duration_hours: 24
  results_output_path: "data/evaluation/results/"
  explanation_quality_scores_path: "data/evaluation/explanation_quality_scores.csv"

  metrics:
    - "recall_at_1"
    - "recall_at_3"
    - "precision"
    - "detection_latency"
    - "mttr_proxy"
    - "explanation_quality"

  baselines:
    - name: "rule_based"
    - name: "ad_only"
    - name: "llm_no_tools"

  # Cross-System Validation (RCAEval)
  rcaeval_evaluation:
    enabled: true
    variants: ["re1", "re2", "re3"]
    results_output_path: "data/evaluation/rcaeval_results/"
    compare_against_published_baselines: true
    published_baselines: ["BARO", "CIRCA", "RCD", "CausalRCA", "MicroHECL"]

  # LogHub HDFS Anomaly Detection Benchmark (Nice-to-Have)
  loghub_benchmark:
    enabled: false
    stages:
      - name: "untrained"
        checkpoint: null
      - name: "pretrained"
        checkpoint: "models/lstm_autoencoder/pretrained_hdfs.pt"
      - name: "finetuned"
        checkpoint: "models/lstm_autoencoder/finetuned_otel.pt"
    target_f1: 0.90
